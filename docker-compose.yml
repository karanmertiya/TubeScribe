services:
  app:
    build: .
    container_name: tubescribe
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist analytics DB across container restarts
      - tubescribe-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tubescribe-data:
    driver: local
