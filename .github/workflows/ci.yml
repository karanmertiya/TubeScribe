name: CI

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  # ── Job 1: Python lint ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install linters
        run: pip install pyflakes ruff

      - name: Syntax check (pyflakes)
        run: |
          find backend -name "*.py" | xargs python -m pyflakes
          python -m pyflakes main.py

      - name: Style check (ruff)
        run: ruff check . --select E,F,W --ignore E501 --exclude .venv

  # ── Job 2: Docker build + smoke test ───────────────────────────
  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with layer cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: tubescribe:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Smoke test — container starts and /health returns 200
        run: |
          docker run -d \
            --name tubescribe-smoke \
            -p 8000:8000 \
            -e ADMIN_PASSWORD=testpass \
            -e SESSION_SECRET=testsecret \
            tubescribe:ci

          for i in $(seq 1 15); do
            sleep 2
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ /health responded OK"
              break
            fi
            echo "Waiting… ($i/15)"
          done

          curl -sf http://localhost:8000/health || (docker logs tubescribe-smoke && exit 1)
          docker stop tubescribe-smoke
